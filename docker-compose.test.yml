services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: babytalk
      POSTGRES_USER: babytalk
      POSTGRES_PASSWORD: babytalk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babytalk"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: babytalk-api:latest
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://babytalk:babytalk@postgres:5432/babytalk
      JWT_SECRET: test-secret-do-not-use-in-production
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@babytalk.dev
      WEB_URL: http://localhost:3000
      PORT: "4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/readyz').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: babytalk-web:latest
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:4000/graphql
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/livez').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      api:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

volumes:
  pgdata:
