services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-babytalk}
      POSTGRES_USER: ${POSTGRES_USER:-babytalk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-babytalk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/lachieh/babytalk-api:${IMAGE_TAG:-nightly}
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-babytalk}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-babytalk}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-noreply@babytalk.dev}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      PORT: "4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/readyz').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/lachieh/babytalk-web:${IMAGE_TAG:-nightly}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000/graphql}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/livez').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
