services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: babytalk
      POSTGRES_USER: babytalk
      POSTGRES_PASSWORD: babytalk
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  tambo-postgres:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: tambo
      POSTGRES_USER: tambo
      POSTGRES_PASSWORD: tambo
    volumes:
      - tambo-pgdata:/var/lib/postgresql/data

  tambo-api:
    image: ghcr.io/tambo-ai/tambo-api-server:latest
    ports:
      - "8261:8261"
    environment:
      DATABASE_URL: postgresql://tambo:tambo@tambo-postgres:5432/tambo
      API_KEY_SECRET: dev-tambo-api-key-secret-32chars
      PROVIDER_KEY_SECRET: dev-tambo-provider-key-secret-32
      NEXTAUTH_SECRET: dev-nextauth-secret-at-least-32ch
      NEXTAUTH_URL: http://localhost:8261
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-dummy-not-used}
      FALLBACK_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PORT: "8261"
    depends_on:
      - tambo-postgres

  tambo-web:
    image: ghcr.io/tambo-ai/tambo-web-server:latest
    ports:
      - "8260:3000"
    environment:
      API_URL: http://tambo-api:8261
      DATABASE_URL: postgresql://tambo:tambo@tambo-postgres:5432/tambo
      API_KEY_SECRET: dev-tambo-api-key-secret-32chars
      PROVIDER_KEY_SECRET: dev-tambo-provider-key-secret-32
      NEXTAUTH_SECRET: dev-nextauth-secret-at-least-32ch
      NEXTAUTH_URL: http://localhost:8260
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      - tambo-api

volumes:
  pgdata:
  tambo-pgdata:
