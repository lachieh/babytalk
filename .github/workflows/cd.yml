name: CD

on:
  push:
    branches: [main]
    tags:
      - "@babytalk/api@*"
      - "@babytalk/web@*"
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target
        type: choice
        options: [staging, production]
        default: staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ── Changesets: version PR or create tags ───────────────
  release:
    name: Version or Tag
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Detect which apps are affected ──────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.affected.outputs.api }}
      web: ${{ steps.affected.outputs.web }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Detect affected packages
        id: affected
        run: |
          AFFECTED=$(pnpm turbo build --affected --dry=json | jq -r '.packages[]')
          echo "Affected packages: $AFFECTED"

          API=false
          WEB=false

          for pkg in $AFFECTED; do
            case "$pkg" in
              @babytalk/api) API=true ;;
              @babytalk/web) WEB=true ;;
            esac
          done

          echo "api=$API" >> "$GITHUB_OUTPUT"
          echo "web=$WEB" >> "$GITHUB_OUTPUT"
          echo "API affected: $API, Web affected: $WEB"

  # ── Build & push API image ──────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() && (
        (needs.changes.result == 'success' && needs.changes.outputs.api == 'true') ||
        startsWith(github.ref, 'refs/tags/@babytalk/api@') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/babytalk-api
          bake-target: api
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=@babytalk/api@(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/bake-action@v7
        with:
          targets: api
          push: true
          load: true
          files: |
            docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file }}
      - name: Smoke test
        run: | #shell
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker run -d --name smoke \
            -e DATABASE_URL="postgresql://x:x@localhost:5432/x" \
            -e JWT_SECRET="ci" -p 4000:4000 "$IMAGE"
          sleep 5
          for i in $(seq 1 20); do
            livez=$(curl -sf http://localhost:4000/livez || true)
            if [[ "$livez" == "OK" ]]; then
              echo "Smoke test passed!"
              break
            else
              echo "Livez response: $livez"
            fi
            echo "Attempt $i…"; sleep 3
          done
          curl -sf http://localhost:4000/livez
          docker stop smoke && docker rm smoke

  # ── Build & push Web image ──────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() && (
        (needs.changes.result == 'success' && needs.changes.outputs.web == 'true') ||
        startsWith(github.ref, 'refs/tags/@babytalk/web@') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/babytalk-web
          bake-target: web
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=@babytalk/web@(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/bake-action@v7
        with:
          targets: web
          push: true
          files: |
            docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file }}

  # ── Deploy API to staging ───────────────────────────────
  deploy-api-staging:
    name: Deploy API Staging
    runs-on: ubuntu-latest
    needs: [build-api]
    if: |
      needs.build-api.result == 'success' && (
        github.ref == 'refs/heads/main' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
      )
    environment: staging
    steps:
      - run: |
          curl -f -X GET \
            "${{ secrets.COOLIFY_API_URL }}/api/v1/applications/${{ secrets.COOLIFY_API_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --retry 3 --retry-delay 5

  # ── Deploy Web to staging ───────────────────────────────
  deploy-web-staging:
    name: Deploy Web Staging
    runs-on: ubuntu-latest
    needs: [build-web]
    if: |
      needs.build-web.result == 'success' && (
        github.ref == 'refs/heads/main' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
      )
    environment: staging
    steps:
      - run: |
          curl -f -X GET \
            "${{ secrets.COOLIFY_API_URL }}/api/v1/applications/${{ secrets.COOLIFY_WEB_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --retry 3 --retry-delay 5

  # ── Deploy API to production ────────────────────────────
  deploy-api-production:
    name: Deploy API Production
    runs-on: ubuntu-latest
    needs: [build-api]
    if: |
      needs.build-api.result == 'success' && (
        startsWith(github.ref, 'refs/tags/@babytalk/api@') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
      )
    environment: production
    steps:
      - run: |
          curl -f -X GET \
            "${{ secrets.COOLIFY_API_URL }}/api/v1/applications/${{ secrets.COOLIFY_API_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --retry 3 --retry-delay 5

  # ── Deploy Web to production ────────────────────────────
  deploy-web-production:
    name: Deploy Web Production
    runs-on: ubuntu-latest
    needs: [build-web]
    if: |
      needs.build-web.result == 'success' && (
        startsWith(github.ref, 'refs/tags/@babytalk/web@') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
      )
    environment: production
    steps:
      - run: |
          curl -f -X GET \
            "${{ secrets.COOLIFY_API_URL }}/api/v1/applications/${{ secrets.COOLIFY_WEB_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --retry 3 --retry-delay 5

  # ── Cleanup old images ──────────────────────────────────
  cleanup:
    name: Prune old images
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: always() && (needs.build-api.result == 'success' || needs.build-web.result == 'success')
    strategy:
      fail-fast: false
      matrix:
        package: [babytalk-api, babytalk-web]
    permissions:
      packages: write
    steps:
      - uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
