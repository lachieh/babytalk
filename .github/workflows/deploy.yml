name: Deploy

on:
  push:
    branches: [main]
    tags:
      - "@babytalk/api@*"
      - "@babytalk/web@*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/db/**'
            web:
              - 'apps/web/**'
              - 'packages/db/**'

  deploy-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() && (
        (needs.changes.result == 'success' && needs.changes.outputs.api == 'true') ||
        startsWith(github.ref, 'refs/tags/@babytalk/api@')
      )
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/babytalk-api
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=@babytalk/api@(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: babytalk-api:smoke-test

      - name: Smoke test API image
        run: |
          docker run -d --name api-smoke-test \
            -e DATABASE_URL="postgresql://user:pass@localhost:5432/db" \
            -e JWT_SECRET="ci-test-secret" \
            -p 4000:4000 \
            babytalk-api:smoke-test

          for i in $(seq 1 10); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' api-smoke-test 2>/dev/null || echo "waiting")
            echo "Health check attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy"
              docker stop api-smoke-test && docker rm api-smoke-test
              exit 0
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "Container is unhealthy"
              docker logs api-smoke-test
              docker stop api-smoke-test && docker rm api-smoke-test
              exit 1
            fi
            sleep 5
          done

          echo "Health check timed out"
          docker logs api-smoke-test
          docker stop api-smoke-test && docker rm api-smoke-test
          exit 1

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-web:
    name: Build & Push Web
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() && (
        (needs.changes.result == 'success' && needs.changes.outputs.web == 'true') ||
        startsWith(github.ref, 'refs/tags/@babytalk/web@')
      )
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/babytalk-web
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=@babytalk/web@(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-coolify:
    name: Trigger Coolify Deploy
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: always() && github.ref == 'refs/heads/main' && (needs.deploy-api.result == 'success' || needs.deploy-web.result == 'success')
    steps:
      - name: Trigger deployment
        run: |
          curl -f -X GET \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --retry 3 --retry-delay 5

  cleanup:
    name: Prune old nightly images
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: always() && github.ref == 'refs/heads/main' && (needs.deploy-api.result == 'success' || needs.deploy-web.result == 'success')
    strategy:
      fail-fast: false
      matrix:
        package: [babytalk-api, babytalk-web]
    permissions:
      packages: write
    steps:
      - uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
