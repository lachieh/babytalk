name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "@babytalk/api@*"
      - "@babytalk/web@*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/db/**'
              - 'packages/zpages/**'
              - 'docker/**'
              - 'docker-bake.hcl'
              - 'mise.toml'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            web:
              - 'apps/web/**'
              - 'packages/db/**'
              - 'packages/zpages/**'
              - 'docker/**'
              - 'docker-bake.hcl'
              - 'mise.toml'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  deploy-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() && (
        (needs.changes.result == 'success' && needs.changes.outputs.api == 'true') ||
        startsWith(github.ref, 'refs/tags/@babytalk/api@') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/babytalk-api
          bake-target: api
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=@babytalk/api@(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/setup-buildx-action@v4

      - name: Build & Push API image
        uses: docker/bake-action@v6
        with:
          targets: api
          push: true
          load: true
          files: |
            docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file }}

      - name: Smoke test API image
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker run -d --name api-smoke-test \
            -e DATABASE_URL="postgresql://user:pass@localhost:5432/db" \
            -e JWT_SECRET="ci-test-secret" \
            -p 4000:4000 \
            "$IMAGE"

          sleep 5

          for i in $(seq 1 10); do
            if curl -sf http://localhost:4000/livez > /dev/null 2>&1; then
              echo "API /livez is responding"
              docker stop api-smoke-test && docker rm api-smoke-test
              exit 0
            fi
            echo "Attempt $i: waiting for API..."
            sleep 3
          done

          echo "Smoke test timed out"
          docker logs api-smoke-test
          docker stop api-smoke-test && docker rm api-smoke-test
          exit 1

  deploy-web:
    name: Build & Push Web
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() && (
        (needs.changes.result == 'success' && needs.changes.outputs.web == 'true') ||
        startsWith(github.ref, 'refs/tags/@babytalk/web@') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/babytalk-web
          bake-target: web
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=@babytalk/web@(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/setup-buildx-action@v4

      - name: Build & Push Web image
        uses: docker/bake-action@v6
        with:
          targets: web
          push: true
          files: |
            docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file }}

  deploy-coolify:
    name: Trigger Coolify Deploy
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: |-
      always() && github.ref == 'refs/heads/main' &&
      (
        (needs.deploy-api.result == 'success' && needs.deploy-web.result == 'success') ||
        (needs.deploy-api.result == 'success' && needs.deploy-web.result == 'skipped') ||
        (needs.deploy-api.result == 'skipped' && needs.deploy-web.result == 'success') 
      )
    steps:
      - name: Trigger deployment
        run: |
          curl -f -X GET \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --retry 3 --retry-delay 5

  cleanup:
    name: Prune old nightly images
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: always() && github.ref == 'refs/heads/main' && (needs.deploy-api.result == 'success' || needs.deploy-web.result == 'success')
    strategy:
      fail-fast: false
      matrix:
        package: [babytalk-api, babytalk-web]
    permissions:
      packages: write
    steps:
      - uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
