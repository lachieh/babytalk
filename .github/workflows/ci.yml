name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Lint, Type-check, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: babytalk
          POSTGRES_USER: babytalk
          POSTGRES_PASSWORD: babytalk
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U babytalk"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://babytalk:babytalk@localhost:5432/babytalk
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Lint
        run: pnpm check

      - name: Generate migrations
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate

      - name: Build
        run: pnpm build
