name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Type-check, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: babytalk
          POSTGRES_USER: babytalk
          POSTGRES_PASSWORD: babytalk
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U babytalk"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://babytalk:babytalk@localhost:5432/babytalk

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm check

      - name: Generate migrations
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate

      - name: Build
        run: pnpm build
