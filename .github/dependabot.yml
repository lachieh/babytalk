version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      composite-actions:
        patterns:
          - ".github/actions/*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    cooldown:
      default-days: 5
      semver-major-days: 7
      semver-minor-days: 4
      semver-patch-days: 2
    groups:
      drizzle:
        patterns:
          - "drizzle-kit"
          - "drizzle-orm"
      graphql:
        patterns:
          - "graphql"
          - "graphql-yoga"
          - "@urql/*"
          - "urql"
      pothos:
        patterns:
          - "@pothos/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      next:
        patterns:
          - "next"
          - "@next/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      hono:
        patterns:
          - "hono"
          - "@hono/*"
      vite:
        patterns:
          - "vite"
          - "vite-plugin-*"
          - "vitest"
