<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BabyTalk — Nightlight">
  <title>BabyTalk — Nightlight</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#4a5560"/>
      <stop offset="100%" stop-color="#2a313a"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde6a8" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#e7b35a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e7b35a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lantern" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fdeec0"/>
      <stop offset="60%" stop-color="#f1c976"/>
      <stop offset="100%" stop-color="#c48d3e"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Warm glow halo -->
  <circle cx="256" cy="266" r="220" fill="url(#halo)"/>

  <!-- Lantern: soft rounded rectangle -->
  <g>
    <!-- Top cap -->
    <rect x="216" y="142" width="80" height="22" rx="11" fill="#7d6a3e"/>
    <!-- Tiny ring on top -->
    <rect x="248" y="120" width="16" height="22" rx="6" fill="#7d6a3e"/>
    <!-- Body -->
    <rect x="186" y="166" width="140" height="200" rx="64" fill="url(#lantern)"/>
    <!-- Bottom base -->
    <rect x="208" y="368" width="96" height="22" rx="10" fill="#7d6a3e"/>
    <!-- Subtle highlight on body -->
    <ellipse cx="226" cy="216" rx="22" ry="36" fill="#fff5d4" opacity="0.6"/>
  </g>

  <!-- A few faint stars in the night sky -->
  <g fill="#e7e0c0" opacity="0.75">
    <circle cx="100" cy="120" r="4"/>
    <circle cx="412" cy="140" r="5"/>
    <circle cx="378" cy="92" r="3"/>
    <circle cx="120" cy="420" r="3"/>
    <circle cx="406" cy="404" r="4"/>
  </g>
</svg>
