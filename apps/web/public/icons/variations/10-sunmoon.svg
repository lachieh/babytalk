<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BabyTalk — Sun + Moon">
  <title>BabyTalk — Sun + Moon</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7e6c4"/>
      <stop offset="50%" stop-color="#e6d4a8"/>
      <stop offset="100%" stop-color="#9aa07a"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecb95e"/>
      <stop offset="100%" stop-color="#b88532"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d6b3a"/>
      <stop offset="100%" stop-color="#3a4626"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <!-- Sun (left half) -->
    <path d="M 256 122 A 134 134 0 0 0 256 390 Z" fill="url(#sun)"/>
    <!-- Moon (right half) — crescent-like by overlapping curve -->
    <path d="M 256 122 A 134 134 0 0 1 256 390 Z" fill="url(#moon)"/>
    <!-- Soft crescent cut on the moon to give it shape -->
    <path d="M 256 138 A 118 118 0 0 1 256 374 A 70 118 0 0 0 256 138 Z" fill="#7e8b54" opacity="0.4"/>
  </g>

  <!-- Sun rays (left side) -->
  <g stroke="#b88532" stroke-width="9" stroke-linecap="round">
    <line x1="100" y1="256" x2="58" y2="256"/>
    <line x1="124" y1="166" x2="92" y2="138"/>
    <line x1="124" y1="346" x2="92" y2="374"/>
  </g>

  <!-- Tiny star (right side) -->
  <circle cx="400" cy="160" r="7" fill="#f1e3b8"/>
  <circle cx="392" cy="360" r="5" fill="#f1e3b8"/>
</svg>
