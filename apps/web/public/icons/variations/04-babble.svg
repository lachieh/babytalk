<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BabyTalk — Babble">
  <title>BabyTalk — Babble</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#d5cf9f"/>
      <stop offset="65%" stop-color="#b8b07d"/>
      <stop offset="100%" stop-color="#9a9466"/>
    </radialGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfaf2"/>
      <stop offset="100%" stop-color="#f0e8d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <ellipse cx="256" cy="80" rx="220" ry="60" fill="#ffffff" opacity="0.08"/>

  <g filter="url(#shadow)">
    <!-- Bubble tail at bottom-left -->
    <path d="
      M 188 380
      C 162 408, 142 424, 124 432
      C 134 414, 148 392, 172 366 Z" fill="url(#bubble)"/>
    <!-- Bubble body -->
    <ellipse cx="266" cy="244" rx="170" ry="150" fill="url(#bubble)"/>
  </g>

  <!-- Sound waves: three nested arcs radiating from a small dot, suggesting voice/babble -->
  <g fill="none" stroke="#7e8b54" stroke-linecap="round">
    <circle cx="218" cy="244" r="12" fill="#7e8b54"/>
    <path d="M 244 200 Q 270 244 244 288" stroke-width="14"/>
    <path d="M 286 178 Q 322 244 286 310" stroke-width="12" opacity="0.7"/>
    <path d="M 326 158 Q 372 244 326 330" stroke-width="10" opacity="0.45"/>
  </g>
</svg>
