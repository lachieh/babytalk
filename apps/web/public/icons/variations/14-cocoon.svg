<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BabyTalk — Cocoon">
  <title>BabyTalk — Cocoon</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#d5cf9f"/>
      <stop offset="65%" stop-color="#b8b07d"/>
      <stop offset="100%" stop-color="#9a9466"/>
    </radialGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfaf2"/>
      <stop offset="100%" stop-color="#e8dfc4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <ellipse cx="256" cy="80" rx="220" ry="60" fill="#ffffff" opacity="0.08"/>

  <!-- Cocoon: a soft pointed oval, slightly tilted -->
  <g filter="url(#shadow)" transform="translate(256 260) rotate(-12)">
    <path d="
      M 0 -160
      C 80 -150, 110 -60, 90 60
      C 70 160, 0 160, 0 160
      C 0 160, -70 160, -90 60
      C -110 -60, -80 -150, 0 -160 Z" fill="url(#shell)"/>
    <!-- Subtle "swaddle" wrap lines -->
    <path d="M -84 -30 Q 0 -10 84 -30" stroke="#c8b988" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M -90 30 Q 0 50 90 30" stroke="#c8b988" stroke-width="3" fill="none" opacity="0.6"/>
  </g>

  <!-- Tiny baby dot inside cocoon (sleeping) -->
  <circle cx="262" cy="240" r="11" fill="#b88532"/>
</svg>
