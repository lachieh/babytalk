<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BabyTalk — Lullaby">
  <title>BabyTalk — Lullaby</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#d5cf9f"/>
      <stop offset="65%" stop-color="#b8b07d"/>
      <stop offset="100%" stop-color="#9a9466"/>
    </radialGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfaf2"/>
      <stop offset="100%" stop-color="#efe6cf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <ellipse cx="256" cy="80" rx="220" ry="60" fill="#ffffff" opacity="0.08"/>

  <g transform="translate(280 260)" filter="url(#shadow)">
    <!-- Large crescent: bulge on the left, face on the bulge -->
    <path d="M 0 -160 A 160 160 0 1 0 0 160 A 112 160 0 1 1 0 -160 Z" fill="url(#moon)"/>
  </g>

  <!-- Sleepy face on the moon's left bulge (single eye + smile, like a peaceful profile) -->
  <g transform="translate(280 260)">
    <!-- Closed sleepy eye (wide curve) -->
    <path d="M -58 -22 Q -30 4 -2 -22" stroke="#5a3d12" stroke-width="12" stroke-linecap="round" fill="none"/>
    <!-- Smile -->
    <path d="M -42 30 Q -22 54 -2 30" stroke="#5a3d12" stroke-width="11" stroke-linecap="round" fill="none"/>
    <!-- Cheek blush -->
    <ellipse cx="-72" cy="8" rx="14" ry="8" fill="#d98a8a" opacity="0.55"/>
  </g>

  <!-- Twinkle stars -->
  <g fill="#c47a91">
    <path d="
      M 108 142
      C 110 128, 116 128, 118 142
      C 124 152, 134 156, 144 158
      C 134 160, 124 164, 118 174
      C 116 188, 110 188, 108 174
      C 102 164, 92 160, 82 158
      C 92 156, 102 152, 108 142 Z"/>
    <circle cx="120" cy="396" r="7"/>
    <circle cx="120" cy="396" r="3" fill="#fdfaf2"/>
  </g>
</svg>
