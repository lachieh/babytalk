<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BabyTalk — Heart Bubble">
  <title>BabyTalk — Heart Bubble</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#f4e0dc"/>
      <stop offset="100%" stop-color="#c8a89e"/>
    </radialGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfaf2"/>
      <stop offset="100%" stop-color="#efe1c8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <!-- Bubble tail (drop) at bottom-left -->
    <path d="
      M 200 372
      C 174 396, 156 410, 138 416
      C 150 398, 168 380, 188 358 Z" fill="url(#heart)"/>
    <!-- Heart shape -->
    <path d="
      M 256 412
      C 232 380, 168 340, 132 280
      C 96 218, 130 132, 192 132
      C 226 132, 244 154, 256 178
      C 268 154, 286 132, 320 132
      C 382 132, 416 218, 380 280
      C 344 340, 280 380, 256 412 Z" fill="url(#heart)"/>
  </g>

  <!-- Tiny sparkle dot inside heart -->
  <circle cx="312" cy="200" r="9" fill="#c47a91" opacity="0.7"/>
  <circle cx="312" cy="200" r="3" fill="#fdfaf2"/>
</svg>
