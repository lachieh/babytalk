<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BabyTalk — Trio">
  <title>BabyTalk — Trio</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf5e4"/>
      <stop offset="100%" stop-color="#ede4cb"/>
    </linearGradient>
    <radialGradient id="feed" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a4b673"/>
      <stop offset="100%" stop-color="#6f8048"/>
    </radialGradient>
    <radialGradient id="sleep" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8aa5c8"/>
      <stop offset="100%" stop-color="#5b7a9d"/>
    </radialGradient>
    <radialGradient id="diaper" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#deb654"/>
      <stop offset="100%" stop-color="#a98531"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Three soft circles arranged in a gentle triangle -->
  <g filter="url(#shadow)">
    <!-- Top: feed (sage) -->
    <circle cx="256" cy="170" r="80" fill="url(#feed)"/>
    <!-- Bottom-left: sleep (soft blue) -->
    <circle cx="170" cy="334" r="80" fill="url(#sleep)"/>
    <!-- Bottom-right: diaper (warm honey) -->
    <circle cx="342" cy="334" r="80" fill="url(#diaper)"/>
  </g>
</svg>
