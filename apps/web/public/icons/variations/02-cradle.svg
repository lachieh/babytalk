<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BabyTalk — Cradle">
  <title>BabyTalk — Cradle</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf5e4"/>
      <stop offset="100%" stop-color="#ede4cb"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7e8b54"/>
      <stop offset="100%" stop-color="#5d6b3a"/>
    </linearGradient>
    <radialGradient id="star" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ecb95e"/>
      <stop offset="100%" stop-color="#b58530"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Crescent rotated 45deg so its opening cups toward the upper-right, cradling the star -->
  <g transform="translate(256 280) rotate(-50)">
    <path d="M 0 -150 A 150 150 0 1 0 0 150 A 90 150 0 1 1 0 -150 Z" fill="url(#moon)"/>
  </g>

  <!-- Tiny soft 4-point star nestled in the cradle -->
  <g transform="translate(320 196)">
    <path d="
      M 0 -48
      C 6 -18, 18 -6, 48 0
      C 18 6, 6 18, 0 48
      C -6 18, -18 6, -48 0
      C -18 -6, -6 -18, 0 -48 Z" fill="url(#star)"/>
    <!-- Inner highlight -->
    <circle cx="-6" cy="-8" r="6" fill="#fcefca" opacity="0.7"/>
  </g>
</svg>
