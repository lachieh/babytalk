<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BabyTalk">
  <title>BabyTalk</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf5e4"/>
      <stop offset="100%" stop-color="#ede4cb"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background so any mask shape (circle, squircle, rounded rect) works -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Artwork scaled to 75% and centered so it stays inside the 80% safe zone -->
  <g transform="translate(64 64) scale(0.75)">
    <g fill="#5d6b3a">
      <rect x="138" y="92" width="58" height="328" rx="14"/>
      <circle cx="284" cy="318" r="116"/>
      <rect x="170" y="232" width="118" height="60"/>
    </g>
    <circle cx="296" cy="318" r="48" fill="#fbf5e4"/>
    <g>
      <circle cx="404" cy="146" r="11" fill="#c47a91"/>
      <circle cx="404" cy="146" r="4" fill="#fbf5e4"/>
    </g>
  </g>
</svg>
