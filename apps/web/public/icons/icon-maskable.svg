<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BabyTalk">
  <title>BabyTalk</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#d5cf9f"/>
      <stop offset="65%" stop-color="#b8b07d"/>
      <stop offset="100%" stop-color="#9a9466"/>
    </radialGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfaf2"/>
      <stop offset="100%" stop-color="#f1e9d5"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e7b35a"/>
      <stop offset="100%" stop-color="#b88532"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background fills the safe-zone margins so any mask shape works -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Artwork scaled to 75% and centered: stays well inside the 80% safe zone -->
  <g transform="translate(64 64) scale(0.75)">
    <g filter="url(#shadow)">
      <path d="
        M 200 372
        C 178 392, 162 408, 148 412
        C 156 396, 168 380, 188 358
        Z" fill="url(#bubble)"/>
      <path d="
        M 256 110
        C 350 110, 412 168, 412 248
        C 412 320, 358 380, 280 388
        C 250 391, 222 388, 196 378
        C 168 388, 144 388, 128 380
        C 156 360, 168 340, 168 320
        C 132 296, 108 256, 108 216
        C 108 152, 170 110, 256 110 Z" fill="url(#bubble)"/>
    </g>

    <g transform="translate(232 232)">
      <path d="
        M 0 -78
        A 78 78 0 1 0 0 78
        A 60 78 0 1 1 0 -78 Z" fill="url(#moon)"/>
      <path d="M -22 -10 Q -10 4 2 -10" stroke="#5a3d12" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M -16 22 Q -6 32 6 22" stroke="#5a3d12" stroke-width="5" stroke-linecap="round" fill="none"/>
      <ellipse cx="-22" cy="12" rx="7" ry="4" fill="#d98a8a" opacity="0.55"/>
    </g>

    <g fill="#c47a91">
      <path d="
        M 348 168
        C 350 158, 354 158, 356 168
        C 360 174, 366 176, 372 176
        C 366 178, 360 180, 356 186
        C 354 196, 350 196, 348 186
        C 344 180, 338 178, 332 176
        C 338 176, 344 174, 348 168 Z"/>
      <circle cx="360" cy="312" r="6"/>
      <circle cx="360" cy="312" r="2" fill="#fdfaf2"/>
    </g>
  </g>
</svg>
